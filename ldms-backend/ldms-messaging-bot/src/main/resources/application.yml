spring:
  application:
    name: ldms-messaging-inbound
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  config:
    import:
      - optional:configserver:http://${CONFIG_SERVER_USERNAME:developer}:${CONFIG_SERVER_PASSWORD_ENCODED:Config098%28%29%21}@${CONFIG_SERVER_HOST:localhost}:${CONFIG_SERVER_PORT:8888}
      - optional:classpath:ldms-local-dev-overrides.yml
  cloud:
    config:
      name: ldms-messaging-bot
      send-all-labels: false
      fail-fast: ${SPRING_CLOUD_CONFIG_FAIL_FAST:false}
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/ldms_messaging_inbound?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true
    username: ${DB_USERNAME:${MYSQL_USER:developer}}
    password: ${DB_PASSWORD:${MYSQL_DEVELOPER_PASSWORD:Password098()!}}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8095}
  max-http-request-header-size: 65536

jwt:
  secret: ${JWT_SECRET:LDMS-local-dev-jwt-secret-at-least-thirty-two-chars-long}

ldms:
  dev:
    force-local-feign-clients: true
  api-gateway:
    base-url: http://${API_GATEWAY_HOST:127.0.0.1}:${GATEWAY_SERVER_PORT:8091}
  bot:
    gemini:
      api-key: ${GEMINI_API_KEY:}
      model: ${GEMINI_MODEL:gemini-2.5-flash}
      enabled: ${GEMINI_ENABLED:true}
    knowledge:
      resource: classpath:ldms-knowledge/ldms-system-architecture.md
      # Reload every 6h when > 0 or when directory is set (see reload-cron)
      reload-interval-minutes: ${LDMS_BOT_KNOWLEDGE_RELOAD_MINUTES:360}
      reload-cron: ${LDMS_BOT_KNOWLEDGE_RELOAD_CRON:0 0 */6 * * *}
      # Optional live corpus outside the JAR, e.g. file:/opt/ldms/bot-knowledge
      directory: ${LDMS_BOT_KNOWLEDGE_DIR:}

CLIENTS_API_GATEWAY_URL: http://${API_GATEWAY_HOST:127.0.0.1}:${GATEWAY_SERVER_PORT:8091}
CLIENTS_USER_MANAGEMENT_SERVICE_URL: http://${API_GATEWAY_HOST:127.0.0.1}:${GATEWAY_SERVER_PORT:8091}
CLIENTS_ORGANIZATION_MANAGEMENT_SERVICE_URL: http://${API_GATEWAY_HOST:127.0.0.1}:${GATEWAY_SERVER_PORT:8091}

clients:
  base-url:
    apiGateway: http://${API_GATEWAY_HOST:127.0.0.1}:${GATEWAY_SERVER_PORT:8091}
    userManagementService: http://${API_GATEWAY_HOST:127.0.0.1}:${GATEWAY_SERVER_PORT:8091}
    organizationManagementService: http://${API_GATEWAY_HOST:127.0.0.1}:${GATEWAY_SERVER_PORT:8091}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://eureka:Eureka098%28%29%21@localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
      base-path: /actuator
  endpoint:
    health:
      show-details: always
