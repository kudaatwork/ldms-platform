spring:
  application:
    name: ldms-notifications
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:developer}
    password: ${RABBITMQ_PASSWORD:Password098()!}
    virtual-host: /
  config:
    import: optional:configserver:http://${CONFIG_SERVER_USERNAME:developer}:${CONFIG_SERVER_PASSWORD_ENCODED:Config098%28%29%21}@${CONFIG_SERVER_HOST:localhost}:${CONFIG_SERVER_PORT:8888}
  cloud:
    config:
      name: ldms-notifications
      send-all-labels: true
      fail-fast: ${SPRING_CLOUD_CONFIG_FAIL_FAST:false}
      retry:
        max-attempts: 5
        initial-interval: 2000
        max-interval: 10000
        multiplier: 1.5
    aws:
      region:
        static: ${AWS_REGION:eu-west-1}
      credentials:
        access-key: ${AWS_ACCESS_KEY_ID:}
        secret-key: ${AWS_SECRET_ACCESS_KEY:}
      ses:
        # Custom OutboundSesClientSupplier sends mail; disable Spring Cloud AWS auto SES client.
        enabled: false

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://eureka:Eureka098%28%29%21@localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true

# Align with ldms-audit-trail (topic exchange ldms.audit.exchange). Do not use legacy exchange.audit.log.
ldms:
  audit-rabbitmq:
    exchange: ${LDMS_AUDIT_RABBITMQ_EXCHANGE:ldms.audit.exchange}
    routing-key: ${LDMS_AUDIT_RABBITMQ_ROUTING_KEY:audit.log}

# Outbound credentials: loaded from ldms-config-repo/.env at startup (see LdmsConfigRepoDotenvEnvironmentPostProcessor).
# Override path: LDMS_CONFIG_REPO_DIR=/absolute/path/to/ldms-config-repo
# Optional outbound email/SMS (never commit real secrets to this repo)
aws:
  ses:
    from-email: ${AWS_SES_FROM_EMAIL:}

twilio:
  account-sid: ${TWILIO_ACCOUNT_SID:}
  auth-token: ${TWILIO_AUTH_TOKEN:}
  phone-number: ${TWILIO_PHONE_NUMBER:}
  whatsapp:
    from-number: ${TWILIO_WHATSAPP_FROM:}

sendgrid:
  api-key: ${SENDGRID_API_KEY:}
  from-email: ${SENDGRID_FROM_EMAIL:${AWS_SES_FROM_EMAIL:}}

notifications:
  # Prefer AWS SES for email (default). Set NOTIFICATIONS_EMAIL_PROVIDER=sendgrid only if not using SES.
  email:
    provider: ${NOTIFICATIONS_EMAIL_PROVIDER:ses}
  rabbitmq:
    exchange: ${NOTIFICATIONS_RABBITMQ_EXCHANGE:notifications.direct}
    queue: ${NOTIFICATIONS_RABBITMQ_QUEUE:notifications.queue}
    routing-key: ${NOTIFICATIONS_RABBITMQ_ROUTING_KEY:notifications.send}
