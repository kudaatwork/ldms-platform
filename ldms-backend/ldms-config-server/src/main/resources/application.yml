server:
  port: 8888

spring:
  security:
    user:
      name: admin
      # Override in env for non-local (e.g. export CONFIG_SERVER_PASSWORD=...). Default allows IDE/local run without env.
      password: ${CONFIG_SERVER_PASSWORD:changeme}
  cloud:
    config:
      enabled: false
      server:
        git:
          # Central repo lives in the platform tree; override with LDMS_CONFIG_REPO if needed.
          uri: file://${LDMS_CONFIG_REPO:${user.home}/IdeaProjects/ldms-platform/ldms-config-repo}
          # Resolve e.g. dev/ldms-user-management.yml when profile is dev.
          search-paths: '{profile}'

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized
