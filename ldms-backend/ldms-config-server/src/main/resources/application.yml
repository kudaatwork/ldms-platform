server:
  port: 8888

spring:
  security:
    user:
      name: ${CONFIG_SERVER_USERNAME:developer}
      password: ${CONFIG_SERVER_PASSWORD:Config098()!}
  cloud:
    config:
      enabled: false
      server:
        git:
          uri: ${LDMS_CONFIG_GIT_URI:https://github.com/kudaatwork/ldms-config-repo.git}
          clone-on-start: true
          default-label: ${LDMS_CONFIG_GIT_BRANCH:main}
          search-paths: '{profile}'

eureka:
  client:
    service-url:
      defaultZone: http://eureka:Eureka098()!@localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized
