server:
  port: 8761

spring:
  application:
    name: ldms-eureka-server
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  config:
    import: optional:configserver:http://${CONFIG_SERVER_HOST:localhost}:8888
  cloud:
    config:
      username: ${CONFIG_SERVER_USERNAME:developer}
      password: ${CONFIG_SERVER_PASSWORD:Config098()!}
  security:
    user:
      name: ${EUREKA_DASHBOARD_USER:eureka}
      password: ${EUREKA_DASHBOARD_PASSWORD:Eureka098()!}

eureka:
  client:
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: http://${spring.security.user.name}:${spring.security.user.password}@localhost:${server.port}/eureka/
