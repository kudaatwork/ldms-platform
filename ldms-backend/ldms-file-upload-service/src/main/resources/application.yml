server:
  port: ${SERVER_PORT:8085}

spring:
  application:
    name: file-upload-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  config:
    import: optional:configserver:http://${CONFIG_SERVER_USERNAME:developer}:${CONFIG_SERVER_PASSWORD_ENCODED:Config098%28%29%21}@${CONFIG_SERVER_HOST:localhost}:${CONFIG_SERVER_PORT:8888}
  cloud:
    config:
      name: ldms-file-upload-service
      send-all-labels: true
      fail-fast: false
      retry:
        max-attempts: 5
        initial-interval: 2000
        max-interval: 10000
        multiplier: 1.5
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/ldms_file_upload?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${MYSQL_USER:developer}
    password: ${MYSQL_PASSWORD:Password098()!}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

eureka:
  username: ${EUREKA_USERNAME:eureka}
  password: ${EUREKA_PASSWORD:Eureka098()!}
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka}
    register-with-eureka: true
    fetch-registry: true

jwt:
  secret: ${JWT_SECRET:dev-secret-must-be-at-least-256-bits-for-hs256-xxxxxxxxxxxxxxxx}
  access-token-expiration-ms: ${JWT_ACCESS_MS:3600000}
  refresh-token-expiration-ms: ${JWT_REFRESH_MS:86400000}

# RustFS File Storage Service
rustfs:
  enabled: true
  base-url: ${RUSTFS_BASE_URL:http://localhost:8200}
  internal-token: ${RUSTFS_INTERNAL_TOKEN:dev-token-change-me}

file:
  upload:
    location: ${FILE_UPLOAD_LOCAL_PATH:./uploads}

management:
  server:
    port: ${MANAGEMENT_SERVER_PORT:9085}
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
