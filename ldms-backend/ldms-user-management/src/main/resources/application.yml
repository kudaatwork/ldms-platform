spring:
  application:
    name: user-management-service

  profiles:
    active: dev

  config:
    import: optional:configserver:http://localhost:8010/

  cloud:
    config:
      fail-fast: true
      retry:
        max-attempts: 5
        initial-interval: 2000
        max-interval: 10000
        multiplier: 1.5

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8765/eureka/

management:
  server:
    port: 9001

  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info,prometheus,metrics

  endpoint:
    health:
      show-details: always
      probes:
        enabled: true

  metrics:
    tags:
      application: user-management-service
      environment: dev
      system: ldms-local
      team: kuda-lab

# Location Service Configuration
location:
  service:
    url: http://locations-management-service

# Client Service URLs
clients:
  baseUrl:
    locationService: http://locations-management-service