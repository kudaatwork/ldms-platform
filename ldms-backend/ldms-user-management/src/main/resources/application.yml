spring:
  application:
    name: user-management
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  config:
    import: optional:configserver:http://${CONFIG_SERVER_HOST:localhost}:8888
  cloud:
    config:
      name: ldms-user-management
      username: ${CONFIG_SERVER_USERNAME:developer}
      password: ${CONFIG_SERVER_PASSWORD:Config098()!}
      fail-fast: true
      retry:
        max-attempts: 5
        initial-interval: 2000
        max-interval: 10000
        multiplier: 1.5

eureka:
  username: ${EUREKA_USERNAME:eureka}
  password: "${EUREKA_PASSWORD:Eureka098()!}"
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka}
    register-with-eureka: true
    fetch-registry: true
