server:
  port: ${SERVER_PORT:8099}

# Fallback when Spring Cloud Config is unavailable. Must match ldms-authentication / ldms-api-gateway.
jwt:
  secret: ${JWT_SECRET:LDMS-local-dev-jwt-secret-at-least-thirty-two-chars-long}
  access-token-expiration-ms: ${JWT_ACCESS_MS:3600000}
  refresh-token-expiration-ms: ${JWT_REFRESH_MS:86400000}

spring:
  batch:
    jdbc:
      initialize-schema: never
    job:
      enabled: false
  application:
    name: ldms-audit-trail
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  config:
    import: optional:configserver:http://${CONFIG_SERVER_USERNAME:developer}:${CONFIG_SERVER_PASSWORD_ENCODED:Config098%28%29%21}@${CONFIG_SERVER_HOST:localhost}:${CONFIG_SERVER_PORT:8888}
  cloud:
    config:
      name: ldms-audit-trail
      send-all-labels: true
      fail-fast: ${SPRING_CLOUD_CONFIG_FAIL_FAST:false}
      retry:
        max-attempts: 5
        initial-interval: 2000
        max-interval: 10000
        multiplier: 1.5

logging:
  level:
    org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration: ERROR

ldms:
  audit:
    churn:
      scheduler-enabled: true
      chunk-size: 10000
      job-pool-size: 4

management:
  endpoints:
    web:
      exposure:
        include: health,info
      base-path: /actuator
  endpoint:
    health:
      show-details: always
  health:
    rabbit:
      enabled: false
