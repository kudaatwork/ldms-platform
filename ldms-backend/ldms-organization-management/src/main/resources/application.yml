# Bootstrap only — runtime settings (port, datasource, JWT, RabbitMQ, app.*) are loaded from
# Spring Cloud Config. The authoritative files live in the Git config repo at
# https://github.com/kudaatwork/ldms-config-repo under {profile}/ldms-organization-management.yml
# (locally: ../ldms-config-repo/dev/ldms-organization-management.yml).

spring:
  application:
    name: organization-management-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  config:
    import: optional:configserver:http://${CONFIG_SERVER_HOST:localhost}:8888
  cloud:
    config:
      name: ldms-organization-management
      username: ${CONFIG_SERVER_USERNAME:developer}
      password: ${CONFIG_SERVER_PASSWORD:Config098()!}
      fail-fast: true
      retry:
        max-attempts: 5
        initial-interval: 2000
        max-interval: 10000
        multiplier: 1.5
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://eureka:Eureka098%28%29%21@localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
