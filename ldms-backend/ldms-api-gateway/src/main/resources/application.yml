# The API Gateway always listens on 8091. Profile-specific config from the
# Config Server may override this (and other settings), but this baseline
# guarantees the port is correct even if the Config Server is unreachable
# (the import below is `optional:`, so missing config does not fail startup).
server:
  port: ${GATEWAY_SERVER_PORT:8091}
  max-http-request-header-size: 65536

spring:
  application:
    name: ldms-api-gateway
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  config:
    # Config Server Basic auth embedded in URL (required for spring.config.import).
    import:
      - optional:configserver:http://${CONFIG_SERVER_USERNAME:developer}:${CONFIG_SERVER_PASSWORD_ENCODED:Config098%28%29%21}@${CONFIG_SERVER_HOST:localhost}:${CONFIG_SERVER_PORT:8888}
      - optional:classpath:ldms-local-dev-overrides.yml
  cloud:
    config:
      name: ldms-api-gateway
      send-all-labels: false
      fail-fast: ${SPRING_CLOUD_CONFIG_FAIL_FAST:false}
      retry:
        max-attempts: 5
        initial-interval: 2000
        max-interval: 10000
        multiplier: 1.5
    loadbalancer:
      cache:
        enabled: false
    gateway:
      # CORS for browsers calling the gateway directly (e.g. :4200 → :8091). add-to-simple-url-handler-mapping
      # ensures OPTIONS preflight succeeds even when a route is missing or downstream is down.
      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowedOriginPatterns:
              - "http://localhost:*"
              - "http://127.0.0.1:*"
              - "https://localhost:*"
              - "https://127.0.0.1:*"
              - "${LDMS_CORS_ADMIN_ORIGIN:https://admin.projectlx.co.zw}"
              - "${LDMS_CORS_PLATFORM_ORIGIN:https://portal.projectlx.co.zw}"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
              - HEAD
            allowedHeaders: "*"
            exposedHeaders:
              - Authorization
              - Content-Disposition
            allowCredentials: true
            maxAge: 3600
      # Downstream @CrossOrigin headers are stripped in StripDownstreamCorsGlobalFilter so globalcors
      # remains the single browser policy when clients call the gateway directly (e.g. mobile / Postman).
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials Access-Control-Allow-Methods Access-Control-Allow-Headers Access-Control-Expose-Headers Access-Control-Max-Age Vary, RETAIN_FIRST
      # Local fallback routes so the gateway still works when Config Server
      # is unavailable (import above is optional).
      routes:
        # Fallback when Config Server is down. Live routes use LdmsAuditTrailGatewayRoutesConfiguration
        # (Config Server may use lb://audit-trail — wrong Eureka id).
        - id: local-audit-trail
          uri: http://${AUDIT_TRAIL_HOST:127.0.0.1}:${AUDIT_TRAIL_PORT:8099}
          predicates:
            - Path=/ldms-audit-trail/**
        # Fallback when Config Server is down. Live routes use LdmsLocationsGatewayRoutesConfiguration
        # (Config Server may use lb://ldms-location-management — wrong when Eureka is down).
        - id: local-system-locations
          uri: http://${LOCATIONS_HOST:127.0.0.1}:${LOCATIONS_PORT:8084}
          predicates:
            - Path=/ldms-locations/v1/system/**
        - id: local-frontend-locations
          uri: http://${LOCATIONS_HOST:127.0.0.1}:${LOCATIONS_PORT:8084}
          predicates:
            - Path=/ldms-locations/v1/frontend/**
        - id: local-backoffice-locations
          uri: http://${LOCATIONS_HOST:127.0.0.1}:${LOCATIONS_PORT:8084}
          predicates:
            - Path=/ldms-locations/v1/backoffice/**
        # Fallback when Config Server is down. Live routes use LdmsNotificationsGatewayRoutesConfiguration
        # (Config Server still has lb://notifications — wrong Eureka id; programmatic routes win via order).
        - id: local-system-notifications
          uri: http://${NOTIFICATIONS_HOST:127.0.0.1}:${NOTIFICATIONS_PORT:8094}
          predicates:
            - Path=/ldms-notifications/v1/system/**
        - id: local-frontend-notifications
          uri: http://${NOTIFICATIONS_HOST:127.0.0.1}:${NOTIFICATIONS_PORT:8094}
          predicates:
            - Path=/ldms-notifications/v1/frontend/**
        - id: local-backoffice-notifications
          uri: http://${NOTIFICATIONS_HOST:127.0.0.1}:${NOTIFICATIONS_PORT:8094}
          predicates:
            - Path=/ldms-notifications/v1/backoffice/**
        - id: local-system-messaging-inbound
          uri: http://${MESSAGING_INBOUND_HOST:127.0.0.1}:${MESSAGING_INBOUND_PORT:8095}
          predicates:
            - Path=/ldms-messaging-inbound/v1/system/**
        - id: local-frontend-messaging-inbound
          uri: http://${MESSAGING_INBOUND_HOST:127.0.0.1}:${MESSAGING_INBOUND_PORT:8095}
          predicates:
            - Path=/ldms-messaging-inbound/v1/frontend/**
        - id: local-backoffice-messaging-inbound
          uri: http://${MESSAGING_INBOUND_HOST:127.0.0.1}:${MESSAGING_INBOUND_PORT:8095}
          predicates:
            - Path=/ldms-messaging-inbound/v1/backoffice/**
        - id: local-system-user-management
          uri: http://${USER_MANAGEMENT_HOST:127.0.0.1}:${USER_MANAGEMENT_PORT:8086}
          predicates:
            - Path=/ldms-user-management/v1/system/**
        - id: local-frontend-user-management
          uri: http://${USER_MANAGEMENT_HOST:127.0.0.1}:${USER_MANAGEMENT_PORT:8086}
          predicates:
            - Path=/ldms-user-management/v1/frontend/**
        - id: local-backoffice-user-management
          uri: http://${USER_MANAGEMENT_HOST:127.0.0.1}:${USER_MANAGEMENT_PORT:8086}
          predicates:
            - Path=/ldms-user-management/v1/backoffice/**
        # Fallback when Config Server is down. Live routes use LdmsOrganizationManagementGatewayRoutesConfiguration
        # (Config Server may use lb://organization-management-service — wrong Eureka id or localhost mismatch).
        - id: local-system-organization-management
          uri: http://${ORGANIZATION_MANAGEMENT_HOST:127.0.0.1}:${ORGANIZATION_MANAGEMENT_PORT:8087}
          predicates:
            - Path=/ldms-organization-management/v1/system/**
        - id: local-frontend-organization-management
          uri: http://${ORGANIZATION_MANAGEMENT_HOST:127.0.0.1}:${ORGANIZATION_MANAGEMENT_PORT:8087}
          predicates:
            - Path=/ldms-organization-management/v1/frontend/**
        - id: local-backoffice-organization-management
          uri: http://${ORGANIZATION_MANAGEMENT_HOST:127.0.0.1}:${ORGANIZATION_MANAGEMENT_PORT:8087}
          predicates:
            - Path=/ldms-organization-management/v1/backoffice/**
        # Fallback when Config Server is down. Live routes use LdmsFleetManagementGatewayRoutesConfiguration.
        - id: local-system-fleet-management
          uri: http://${FLEET_MANAGEMENT_HOST:127.0.0.1}:${FLEET_MANAGEMENT_PORT:8089}
          predicates:
            - Path=/ldms-fleet-management/v1/system/**
        - id: local-frontend-fleet-management
          uri: http://${FLEET_MANAGEMENT_HOST:127.0.0.1}:${FLEET_MANAGEMENT_PORT:8089}
          predicates:
            - Path=/ldms-fleet-management/v1/frontend/**
        - id: local-backoffice-fleet-management
          uri: http://${FLEET_MANAGEMENT_HOST:127.0.0.1}:${FLEET_MANAGEMENT_PORT:8089}
          predicates:
            - Path=/ldms-fleet-management/v1/backoffice/**
        # Fallback when Config Server is down. Live routes use LdmsInventoryManagementGatewayRoutesConfiguration.
        - id: local-system-inventory-management
          uri: http://${INVENTORY_MANAGEMENT_HOST:127.0.0.1}:${INVENTORY_MANAGEMENT_PORT:8013}
          predicates:
            - Path=/ldms-inventory-management/v1/system/**
        - id: local-frontend-inventory-management
          uri: http://${INVENTORY_MANAGEMENT_HOST:127.0.0.1}:${INVENTORY_MANAGEMENT_PORT:8013}
          predicates:
            - Path=/ldms-inventory-management/v1/frontend/**
        - id: local-backoffice-inventory-management
          uri: http://${INVENTORY_MANAGEMENT_HOST:127.0.0.1}:${INVENTORY_MANAGEMENT_PORT:8013}
          predicates:
            - Path=/ldms-inventory-management/v1/backoffice/**
        # Fallback when Config Server is down. Live routes use LdmsBillingPaymentsGatewayRoutesConfiguration.
        - id: local-system-billing-payments
          uri: http://${BILLING_PAYMENTS_HOST:127.0.0.1}:${BILLING_PAYMENTS_PORT:8014}
          predicates:
            - Path=/ldms-billing-payments/v1/system/**
        - id: local-frontend-billing-payments
          uri: http://${BILLING_PAYMENTS_HOST:127.0.0.1}:${BILLING_PAYMENTS_PORT:8014}
          predicates:
            - Path=/ldms-billing-payments/v1/frontend/**
        - id: local-backoffice-billing-payments
          uri: http://${BILLING_PAYMENTS_HOST:127.0.0.1}:${BILLING_PAYMENTS_PORT:8014}
          predicates:
            - Path=/ldms-billing-payments/v1/backoffice/**
        # ldms-authentication (login, refresh, Google) — see LdmsAuthenticationGatewayRoutesConfiguration (order -100).
        - id: local-authentication
          uri: http://${AUTHENTICATION_HOST:127.0.0.1}:${AUTHENTICATION_PORT:8083}
          predicates:
            - Path=/ldms-authentication/**
        # Programmatic routes in LdmsAuthenticationGatewayRoutesConfiguration take precedence when enabled.
        # File upload routes are registered in code (LdmsFileUploadGatewayRoutesConfiguration) so they survive
        # Config Server replacing spring.cloud.gateway.routes. Override host/port with FILE_UPLOAD_HOST / FILE_UPLOAD_PORT.
        # To disable: ldms.gateway.file-upload.routes-enabled=false

eureka:
  client:
    service-url:
      defaultZone: http://eureka:Eureka098%28%29%21@localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
    eureka-server-connect-timeout-seconds: 5
    eureka-server-read-timeout-seconds: 8
    registry-fetch-interval-seconds: 30
    instance-info-replication-interval-seconds: 30
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 30

ldms:
  platform-health:
    probe-timeout-ms: ${LDMS_PLATFORM_HEALTH_PROBE_TIMEOUT_MS:5000}
    default-host: ${API_GATEWAY_HOST:127.0.0.1}
    services:
      - id: api-gateway
        display-name: API Gateway
        eureka-name: ldms-api-gateway
        host: ${API_GATEWAY_HOST:127.0.0.1}
        port: ${GATEWAY_SERVER_PORT:8091}
      - id: authentication
        display-name: Authentication
        eureka-name: auth-management
        host: ${AUTHENTICATION_HOST:127.0.0.1}
        port: ${AUTHENTICATION_PORT:8083}
      - id: locations
        display-name: Locations
        eureka-name: ldms-location-management
        host: ${LOCATIONS_HOST:127.0.0.1}
        port: ${LOCATIONS_PORT:8084}
      - id: user-management
        display-name: User Management
        eureka-name: user-management
        host: ${USER_MANAGEMENT_HOST:127.0.0.1}
        port: ${USER_MANAGEMENT_PORT:8086}
        management-port: ${USER_MANAGEMENT_MANAGEMENT_PORT:9086}
      - id: organization-management
        display-name: Organization Management
        eureka-name: organization-management-service
        host: ${ORGANIZATION_MANAGEMENT_HOST:127.0.0.1}
        port: ${ORGANIZATION_MANAGEMENT_PORT:8087}
      - id: notifications
        display-name: Notifications
        eureka-name: ldms-notifications
        host: ${NOTIFICATIONS_HOST:127.0.0.1}
        port: ${NOTIFICATIONS_PORT:8094}
      - id: messaging-inbound
        display-name: Messaging Inbound & Bot
        eureka-name: ldms-messaging-inbound
        host: ${MESSAGING_INBOUND_HOST:127.0.0.1}
        port: ${MESSAGING_INBOUND_PORT:8095}
      - id: audit-trail
        display-name: Audit Trail
        eureka-name: ldms-audit-trail
        host: ${AUDIT_TRAIL_HOST:127.0.0.1}
        port: ${AUDIT_TRAIL_PORT:8099}
      - id: fleet-management
        display-name: Fleet Management
        eureka-name: ldms-fleet-management
        host: ${FLEET_MANAGEMENT_HOST:127.0.0.1}
        port: ${FLEET_MANAGEMENT_PORT:8089}
      - id: inventory-management
        display-name: Inventory Management
        eureka-name: inventory-management-service
        host: ${INVENTORY_MANAGEMENT_HOST:127.0.0.1}
        port: ${INVENTORY_MANAGEMENT_PORT:8013}
      - id: billing-payments
        display-name: Billing & Payments
        eureka-name: billing-payments-service
        host: ${BILLING_PAYMENTS_HOST:127.0.0.1}
        port: ${BILLING_PAYMENTS_PORT:8014}
        management-port: ${BILLING_PAYMENTS_MANAGEMENT_PORT:9014}
      - id: shipment-management
        display-name: Shipment Management
        eureka-name: shipment-management-service
        host: ${SHIPMENT_MANAGEMENT_HOST:127.0.0.1}
        port: ${SHIPMENT_MANAGEMENT_PORT:8015}
      - id: trip-tracking
        display-name: Trip & Tracking
        eureka-name: trip-tracking-service
        host: ${TRIP_TRACKING_HOST:127.0.0.1}
        port: ${TRIP_TRACKING_PORT:8016}
      - id: fuel-expenses
        display-name: Fuel & Expenses
        eureka-name: fuel-expenses-service
        alternate-eureka-names:
          - ldms-fuel-expenses
        host: ${FUEL_EXPENSES_HOST:127.0.0.1}
        port: ${FUEL_EXPENSES_PORT:8017}
        management-port: ${FUEL_EXPENSES_MANAGEMENT_PORT:9017}
        alternate-ports:
          - 8092
        alternate-management-ports:
          - 9092
      - id: file-upload
        display-name: File Upload
        eureka-name: file-upload-service
        host: ${FILE_UPLOAD_HOST:127.0.0.1}
        port: ${FILE_UPLOAD_PORT:8085}
        management-port: ${FILE_UPLOAD_MANAGEMENT_PORT:9085}
  gateway:
    locations:
      routes-enabled: true
      host: ${LOCATIONS_HOST:127.0.0.1}
      port: ${LOCATIONS_PORT:8084}
    notifications:
      routes-enabled: true
      host: ${NOTIFICATIONS_HOST:127.0.0.1}
      port: ${NOTIFICATIONS_PORT:8094}
    messaging-inbound:
      routes-enabled: true
      host: ${MESSAGING_INBOUND_HOST:127.0.0.1}
      port: ${MESSAGING_INBOUND_PORT:8095}
    audit-trail:
      routes-enabled: true
      host: ${AUDIT_TRAIL_HOST:127.0.0.1}
      port: ${AUDIT_TRAIL_PORT:8099}
    fleet-management:
      routes-enabled: true
      host: ${FLEET_MANAGEMENT_HOST:127.0.0.1}
      port: ${FLEET_MANAGEMENT_PORT:8089}
    inventory-management:
      routes-enabled: true
      host: ${INVENTORY_MANAGEMENT_HOST:127.0.0.1}
      port: ${INVENTORY_MANAGEMENT_PORT:8013}
    billing-payments:
      routes-enabled: true
      host: ${BILLING_PAYMENTS_HOST:127.0.0.1}
      port: ${BILLING_PAYMENTS_PORT:8014}
    authentication:
      routes-enabled: true
      # Downstream ldms-authentication (default 8083). Gateway listens on 8091.
      # Clients: POST http://localhost:8091/ldms-authentication/v1/auth/request-access-token
      host: ${AUTHENTICATION_HOST:127.0.0.1}
      port: ${AUTHENTICATION_PORT:8083}

# Must match ldms-authentication `jwt.secret` (same JWT_SECRET in every run configuration).
gateway:
  jwt:
    secret: ${JWT_SECRET:LDMS-local-dev-jwt-secret-at-least-thirty-two-chars-long}
    roles-claim: roles

management:
  endpoints:
    web:
      exposure:
        include: health,info
      base-path: /actuator
  endpoint:
    health:
      show-details: always

logging:
  level:
    io.netty.resolver.dns.DnsServerAddressStreamProviders: WARN
    com.netflix.discovery.TimedSupervisorTask: ERROR
    com.netflix.discovery.shared.resolver.aws.ConfigClusterResolver: WARN
    com.netflix.discovery.shared.transport.decorator.RetryableEurekaHttpClient: WARN
    com.netflix.discovery.shared.transport.decorator.RedirectingEurekaHttpClient: WARN
