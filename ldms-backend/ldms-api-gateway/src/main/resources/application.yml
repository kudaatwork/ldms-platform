# The API Gateway always listens on 8091. Profile-specific config from the
# Config Server may override this (and other settings), but this baseline
# guarantees the port is correct even if the Config Server is unreachable
# (the import below is `optional:`, so missing config does not fail startup).
server:
  port: ${GATEWAY_SERVER_PORT:8091}

spring:
  application:
    name: ldms-api-gateway
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  config:
    # Config Server Basic auth embedded in URL (required for spring.config.import).
    import: optional:configserver:http://${CONFIG_SERVER_USERNAME:developer}:${CONFIG_SERVER_PASSWORD_ENCODED:Config098%28%29%21}@${CONFIG_SERVER_HOST:localhost}:${CONFIG_SERVER_PORT:8888}
  cloud:
    config:
      name: ldms-api-gateway
      send-all-labels: false
      fail-fast: ${SPRING_CLOUD_CONFIG_FAIL_FAST:false}
      retry:
        max-attempts: 5
        initial-interval: 2000
        max-interval: 10000
        multiplier: 1.5
    loadbalancer:
      cache:
        enabled: false
    gateway:
      # CORS for browsers calling the gateway directly (e.g. :4200 → :8091). add-to-simple-url-handler-mapping
      # ensures OPTIONS preflight succeeds even when a route is missing or downstream is down.
      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowedOriginPatterns:
              - "http://localhost:*"
              - "http://127.0.0.1:*"
              - "https://localhost:*"
              - "https://127.0.0.1:*"
              - "${LDMS_CORS_ADMIN_ORIGIN:https://admin.projectlx.co.zw}"
              - "${LDMS_CORS_PLATFORM_ORIGIN:https://portal.projectlx.co.zw}"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
              - HEAD
            allowedHeaders: "*"
            exposedHeaders:
              - Authorization
              - Content-Disposition
            allowCredentials: true
            maxAge: 3600
      # Downstream @CrossOrigin headers are stripped in StripDownstreamCorsGlobalFilter so globalcors
      # remains the single browser policy when clients call the gateway directly (e.g. mobile / Postman).
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials Access-Control-Allow-Methods Access-Control-Allow-Headers Access-Control-Expose-Headers Access-Control-Max-Age Vary, RETAIN_FIRST
      # Local fallback routes so the gateway still works when Config Server
      # is unavailable (import above is optional).
      routes:
        # Fallback when Config Server is down. Live routes use LdmsAuditTrailGatewayRoutesConfiguration
        # (Config Server may use lb://audit-trail — wrong Eureka id).
        - id: local-audit-trail
          uri: http://${AUDIT_TRAIL_HOST:127.0.0.1}:${AUDIT_TRAIL_PORT:8099}
          predicates:
            - Path=/ldms-audit-trail/**
        # Fallback when Config Server is down. Live routes use LdmsLocationsGatewayRoutesConfiguration
        # (Config Server may use lb://ldms-location-management — wrong when Eureka is down).
        - id: local-system-locations
          uri: http://${LOCATIONS_HOST:127.0.0.1}:${LOCATIONS_PORT:8084}
          predicates:
            - Path=/ldms-locations/v1/system/**
        - id: local-frontend-locations
          uri: http://${LOCATIONS_HOST:127.0.0.1}:${LOCATIONS_PORT:8084}
          predicates:
            - Path=/ldms-locations/v1/frontend/**
        - id: local-backoffice-locations
          uri: http://${LOCATIONS_HOST:127.0.0.1}:${LOCATIONS_PORT:8084}
          predicates:
            - Path=/ldms-locations/v1/backoffice/**
        # Fallback when Config Server is down. Live routes use LdmsNotificationsGatewayRoutesConfiguration
        # (Config Server still has lb://notifications — wrong Eureka id; programmatic routes win via order).
        - id: local-system-notifications
          uri: http://${NOTIFICATIONS_HOST:127.0.0.1}:${NOTIFICATIONS_PORT:8094}
          predicates:
            - Path=/ldms-notifications/v1/system/**
        - id: local-frontend-notifications
          uri: http://${NOTIFICATIONS_HOST:127.0.0.1}:${NOTIFICATIONS_PORT:8094}
          predicates:
            - Path=/ldms-notifications/v1/frontend/**
        - id: local-backoffice-notifications
          uri: http://${NOTIFICATIONS_HOST:127.0.0.1}:${NOTIFICATIONS_PORT:8094}
          predicates:
            - Path=/ldms-notifications/v1/backoffice/**
        - id: local-system-user-management
          uri: http://${USER_MANAGEMENT_HOST:127.0.0.1}:${USER_MANAGEMENT_PORT:8086}
          predicates:
            - Path=/ldms-user-management/v1/system/**
        - id: local-frontend-user-management
          uri: http://${USER_MANAGEMENT_HOST:127.0.0.1}:${USER_MANAGEMENT_PORT:8086}
          predicates:
            - Path=/ldms-user-management/v1/frontend/**
        - id: local-backoffice-user-management
          uri: http://${USER_MANAGEMENT_HOST:127.0.0.1}:${USER_MANAGEMENT_PORT:8086}
          predicates:
            - Path=/ldms-user-management/v1/backoffice/**
        # Fallback when Config Server is down. Live routes use LdmsOrganizationManagementGatewayRoutesConfiguration
        # (Config Server may use lb://organization-management-service — wrong Eureka id or localhost mismatch).
        - id: local-system-organization-management
          uri: http://${ORGANIZATION_MANAGEMENT_HOST:127.0.0.1}:${ORGANIZATION_MANAGEMENT_PORT:8087}
          predicates:
            - Path=/ldms-organization-management/v1/system/**
        - id: local-frontend-organization-management
          uri: http://${ORGANIZATION_MANAGEMENT_HOST:127.0.0.1}:${ORGANIZATION_MANAGEMENT_PORT:8087}
          predicates:
            - Path=/ldms-organization-management/v1/frontend/**
        - id: local-backoffice-organization-management
          uri: http://${ORGANIZATION_MANAGEMENT_HOST:127.0.0.1}:${ORGANIZATION_MANAGEMENT_PORT:8087}
          predicates:
            - Path=/ldms-organization-management/v1/backoffice/**
        # ldms-authentication (login, refresh, Google) — see LdmsAuthenticationGatewayRoutesConfiguration (order -100).
        - id: local-authentication
          uri: http://${AUTHENTICATION_HOST:127.0.0.1}:${AUTHENTICATION_PORT:8083}
          predicates:
            - Path=/ldms-authentication/**
        # Programmatic routes in LdmsAuthenticationGatewayRoutesConfiguration take precedence when enabled.
        # File upload routes are registered in code (LdmsFileUploadGatewayRoutesConfiguration) so they survive
        # Config Server replacing spring.cloud.gateway.routes. Override host/port with FILE_UPLOAD_HOST / FILE_UPLOAD_PORT.
        # To disable: ldms.gateway.file-upload.routes-enabled=false

eureka:
  client:
    service-url:
      defaultZone: http://eureka:Eureka098%28%29%21@localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
    eureka-server-connect-timeout-seconds: 5
    eureka-server-read-timeout-seconds: 8
    registry-fetch-interval-seconds: 30
    instance-info-replication-interval-seconds: 30
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 30

# Service routing overrides (programmatic RouteLocator beans use order -100).
ldms:
  gateway:
    locations:
      routes-enabled: true
      host: ${LOCATIONS_HOST:127.0.0.1}
      port: ${LOCATIONS_PORT:8084}
    notifications:
      routes-enabled: true
      host: ${NOTIFICATIONS_HOST:127.0.0.1}
      port: ${NOTIFICATIONS_PORT:8094}
    audit-trail:
      routes-enabled: true
      host: ${AUDIT_TRAIL_HOST:127.0.0.1}
      port: ${AUDIT_TRAIL_PORT:8099}
    authentication:
      routes-enabled: true
      # Downstream ldms-authentication (default 8083). Gateway listens on 8091.
      # Clients: POST http://localhost:8091/ldms-authentication/v1/auth/request-access-token
      host: ${AUTHENTICATION_HOST:127.0.0.1}
      port: ${AUTHENTICATION_PORT:8083}

# Must match ldms-authentication `jwt.secret` (same JWT_SECRET in every run configuration).
gateway:
  jwt:
    secret: ${JWT_SECRET:LDMS-local-dev-jwt-secret-at-least-thirty-two-chars-long}
    roles-claim: roles

logging:
  level:
    io.netty.resolver.dns.DnsServerAddressStreamProviders: WARN
    com.netflix.discovery.TimedSupervisorTask: ERROR
    com.netflix.discovery.shared.resolver.aws.ConfigClusterResolver: WARN
    com.netflix.discovery.shared.transport.decorator.RetryableEurekaHttpClient: WARN
    com.netflix.discovery.shared.transport.decorator.RedirectingEurekaHttpClient: WARN
