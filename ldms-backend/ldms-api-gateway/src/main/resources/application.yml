# The API Gateway always listens on 8091. Profile-specific config from the
# Config Server may override this (and other settings), but this baseline
# guarantees the port is correct even if the Config Server is unreachable
# (the import below is `optional:`, so missing config does not fail startup).
server:
  port: ${GATEWAY_SERVER_PORT:8091}

spring:
  application:
    name: ldms-api-gateway
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  config:
    import: optional:configserver:http://${CONFIG_SERVER_HOST:localhost}:8888
  cloud:
    config:
      username: ${CONFIG_SERVER_USERNAME:developer}
      password: ${CONFIG_SERVER_PASSWORD:Config098()!}
    gateway:
      # Local fallback routes so the gateway still works when Config Server
      # is unavailable (import above is optional).
      routes:
        - id: local-system-locations
          uri: lb://ldms-location-management
          predicates:
            - Path=/ldms-locations/v1/system/**
        - id: local-frontend-locations
          uri: lb://ldms-location-management
          predicates:
            - Path=/ldms-locations/v1/frontend/**

eureka:
  client:
    service-url:
      defaultZone: http://eureka:Eureka098%28%29%21@localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
    eureka-server-connect-timeout-seconds: 5
    eureka-server-read-timeout-seconds: 8
    registry-fetch-interval-seconds: 30
    instance-info-replication-interval-seconds: 30
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 30

logging:
  level:
    io.netty.resolver.dns.DnsServerAddressStreamProviders: WARN
    com.netflix.discovery.TimedSupervisorTask: ERROR
    com.netflix.discovery.shared.resolver.aws.ConfigClusterResolver: WARN
    com.netflix.discovery.shared.transport.decorator.RetryableEurekaHttpClient: WARN
    com.netflix.discovery.shared.transport.decorator.RedirectingEurekaHttpClient: WARN
