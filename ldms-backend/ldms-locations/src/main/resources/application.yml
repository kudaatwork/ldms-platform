spring:
  application:
    name: ldms-location-management
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  config:
    import: optional:configserver:http://${CONFIG_SERVER_USERNAME:developer}:${CONFIG_SERVER_PASSWORD_ENCODED:Config098%28%29%21}@${CONFIG_SERVER_HOST:localhost}:${CONFIG_SERVER_PORT:8888}
  cloud:
    config:
      # One Git file per service: {profile}/{name}.yml — must match repo exactly (no composite names).
      name: ldms-location-management
      # Avoid comma-splitting label into zero entries ("None of labels [] found") on a later config-data pass.
      send-all-labels: true
      # When true, startup fails if the config server is unreachable or returns an error (e.g. HTTP 500).
      fail-fast: ${SPRING_CLOUD_CONFIG_FAIL_FAST:false}
      retry:
        max-attempts: 5
        initial-interval: 2000
        max-interval: 10000
        multiplier: 1.5

# Config Server uses ${EUREKA_URL:...} for discovery target.
# Use LDMS_EUREKA_URL as the external override to avoid self-referencing EUREKA_URL.
EUREKA_URL: ${LDMS_EUREKA_URL:http://eureka:Eureka098%28%29%21@localhost:8761/eureka/}

eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_SERVER_URL:http://eureka:Eureka098%28%29%21@localhost:8761/eureka/}

# Fallbacks when Spring Cloud Config is unavailable or returns an error (e.g. HTTP 500).
# Remote defaults: ldms-config-repo {profile}/ldms-location-management.yml (this service only).
# Env overrides: JWT_SECRET, JWT_ACCESS_MS, JWT_REFRESH_MS (same names as ldms-file-upload-service dev config).
jwt:
  secret: ${JWT_SECRET:LDMS-local-dev-jwt-secret-at-least-thirty-two-chars-long}
  access-token-expiration-ms: ${JWT_ACCESS_MS:3600000}
  refresh-token-expiration-ms: ${JWT_REFRESH_MS:86400000}

# Datasource URL comes from Config Server (ldms_location_management DB); same pattern as ldms-audit-trail.

logging:
  level:
    org.springframework.cloud.config: INFO
    org.springframework.boot.context.config: INFO
