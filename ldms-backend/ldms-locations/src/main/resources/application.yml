spring:
  application:
    name: ldms-location-management
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  config:
    import: optional:configserver:http://${CONFIG_SERVER_HOST:localhost}:8888
  cloud:
    config:
      username: ${CONFIG_SERVER_USERNAME:developer}
      password: ${CONFIG_SERVER_PASSWORD:Config098()!}
      fail-fast: true
      retry:
        max-attempts: 5
        initial-interval: 2000
        max-interval: 10000
        multiplier: 1.5

# Config Server uses ${EUREKA_URL:...} for discovery target.
# Use LDMS_EUREKA_URL as the external override to avoid self-referencing EUREKA_URL.
EUREKA_URL: ${LDMS_EUREKA_URL:http://eureka:Eureka098%28%29%21@localhost:8761/eureka/}

eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_SERVER_URL:http://eureka:Eureka098%28%29%21@localhost:8761/eureka/}
