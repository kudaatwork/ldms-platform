spring:
  application:
    name: ldms-locations

  profiles:
    active: dev

  config:
    import: optional:configserver:http://localhost:8010/

  cloud:
    config:
      fail-fast: true
      retry:
        max-attempts: 5
        initial-interval: 2000
        max-interval: 10000
        multiplier: 1.5

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8765/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health, metrics, prometheus, info
  endpoint:
    health:
      show-details: always
