# Bootstrap + offline fallbacks when Config Server is unavailable (optional:configserver import).
# When the server is up, ldms-config-repo (dev/ldms-auth-management.yml) overrides these values.

server:
  port: ${AUTH_SERVER_PORT:${AUTHENTICATION_PORT:8083}}
  max-http-request-header-size: 65536

spring:
  application:
    name: auth-management
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  config:
    import: optional:configserver:http://${CONFIG_SERVER_USERNAME:developer}:${CONFIG_SERVER_PASSWORD_ENCODED:Config098%28%29%21}@${CONFIG_SERVER_HOST:localhost}:${CONFIG_SERVER_PORT:8888},optional:file:./config/ldms-auth-management-local.yml
  cloud:
    config:
      name: ldms-auth-management
      # Avoid empty-label config-data passes ("None of labels [] found") with fail-fast enabled.
      send-all-labels: false
      fail-fast: ${SPRING_CLOUD_CONFIG_FAIL_FAST:false}
      retry:
        max-attempts: 5
        initial-interval: 2000
        max-interval: 10000
        multiplier: 1.5
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/ldms_auth_management?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true
    username: ${DB_USERNAME:${MYSQL_USER:developer}}
    password: ${DB_PASSWORD:${MYSQL_DEVELOPER_PASSWORD:Password098()!}}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: false
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    # Existing Hibernate-created schemas: baseline then apply V1+ migrations.
    baseline-on-migrate: true
    baseline-version: 0
    validate-on-migrate: true
    out-of-order: false
    ignore-migration-patterns:
      - "*:missing"
      - "*:future"
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:developer}
    password: ${RABBITMQ_PASSWORD:Password098()!}
    virtual-host: /
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${OAUTH2_ISSUER_URI:}

security:
  oauth2:
    enabled: false

jwt:
  # Must be >= 32 bytes for HS256; Config Server may override JWT_SECRET (short values are SHA-256 stretched at runtime).
  secret: ${JWT_SECRET:LDMS-local-dev-jwt-secret-at-least-thirty-two-chars-long}
  access-token-expiration-ms: 900000
  refresh-token-expiration-ms: 604800000

clients:
  base-url:
    userManagementService: http://${USER_MANAGEMENT_HOST:127.0.0.1}:${USER_MANAGEMENT_PORT:8086}

ldms:
  audit-rabbitmq:
    exchange: ${LDMS_AUDIT_RABBITMQ_EXCHANGE:ldms.audit.exchange}
    routing-key: ${LDMS_AUDIT_RABBITMQ_ROUTING_KEY:audit.log}
  auth:
    google:
      enabled: ${GOOGLE_OAUTH_ENABLED:false}
      client-id: ${GOOGLE_CLIENT_ID:}

---
# IDE / local dev: Config Server often sets Docker hostnames (e.g. user-management:8081) that do not resolve on the host OS.
spring:
  config:
    activate:
      on-profile: dev
  flyway:
    baseline-on-migrate: true
    baseline-version: 0
ldms:
  dev:
    force-local-feign-clients: true

eureka:
  username: ${EUREKA_USERNAME:eureka}
  password: "${EUREKA_PASSWORD:Eureka098()!}"
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka}
    register-with-eureka: ${EUREKA_REGISTER:true}
    fetch-registry: ${EUREKA_FETCH:true}

logging:
  level:
    org.springframework.security.config.annotation.authentication.configuration.InitializeUserDetailsBeanManagerConfigurer: ERROR

management:
  endpoints:
    web:
      exposure:
        include: health,info
      base-path: /actuator
  endpoint:
    health:
      show-details: always
  health:
    rabbit:
      enabled: false
