spring:
  application:
    name: auth-management
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  config:
    import: optional:configserver:http://${CONFIG_SERVER_USERNAME:developer}:${CONFIG_SERVER_PASSWORD_ENCODED:Config098%28%29%21}@${CONFIG_SERVER_HOST:localhost}:${CONFIG_SERVER_PORT:8888}
  cloud:
    config:
      name: ldms-auth-management
      send-all-labels: true
      fail-fast: true
      retry:
        max-attempts: 5
        initial-interval: 2000
        max-interval: 10000
        multiplier: 1.5
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${OAUTH2_ISSUER_URI:}

security:
  oauth2:
    enabled: false

# Google Sign-In (POST /api/v1/auth/google-id-token). Set enabled=true and client-id from Google Cloud Console (OAuth 2.0 Web client).
ldms:
  auth:
    google:
      enabled: ${GOOGLE_OAUTH_ENABLED:false}
      client-id: ${GOOGLE_CLIENT_ID:}

eureka:
  username: ${EUREKA_USERNAME:eureka}
  password: "${EUREKA_PASSWORD:Eureka098()!}"

logging:
  level:
    org.springframework.security.config.annotation.authentication.configuration.InitializeUserDetailsBeanManagerConfigurer: ERROR
