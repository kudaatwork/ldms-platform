server:
  port: 8088

spring:
  application:
    name: ldms-documents-management
  datasource:
    url: jdbc:mysql://${DB_HOST}:3306/ldms_documents_management?useSSL=true&requireSSL=true&serverTimezone=UTC
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 50
      minimum-idle: 10
      idle-timeout: 600000
      connection-timeout: 30000
  jpa:
    show-sql: false
ldms:
  file-service:
    base-url: ${FILE_SERVICE_BASE_URL}
    internal-token: ${FILE_SERVICE_TOKEN}
    max-file-size-mb: 50

management:
  server:
    port: 9088
  tracing:
    sampling:
      probability: 0.05

logging:
  level:
    root: WARN
    projectlx: INFO

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL}