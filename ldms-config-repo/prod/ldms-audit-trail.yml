server:
  port: 8099

spring:
  application:
    name: ldms-audit-trail
  datasource:
    url: jdbc:mysql://${DB_HOST}:3306/ldms_audit_trail?useSSL=true&requireSSL=true&serverTimezone=UTC
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 50
      minimum-idle: 10
      idle-timeout: 600000
      connection-timeout: 30000
  jpa:
    show-sql: false
    properties:
      hibernate.jdbc.batch_size: 50
      hibernate.order_inserts: true
  rabbitmq:
    listener:
      simple:
        concurrency: 3
        max-concurrency: 10
        prefetch: 20
        acknowledge-mode: manual
        default-requeue-rejected: false
ldms:
  audit:
    enabled: false

management:
  server:
    port: 9099
  tracing:
    sampling:
      probability: 0.05

logging:
  level:
    root: WARN
    projectlx: INFO

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL}