server:
  port: 8080

spring:
  application:
    name: ldms-api-gateway
  jpa:
    hibernate:
      ddl-auto: none
  flyway:
    enabled: false
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  cloud:
    gateway:
      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowedOriginPatterns:
              - "${GATEWAY_CORS_ORIGIN_1:https://app.projectlx.co.zw}"
            allowedMethods:
              - GET
              - HEAD
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            exposedHeaders:
              - "X-User-Id"
              - "X-User-Roles"
            allowCredentials: true
            maxAge: 3600
      default-filters:
        - name: RequestRateLimiter
          args:
            redis-rate-limiter.replenishRate: 2
            redis-rate-limiter.burstCapacity: 100
            key-resolver: "#{@ipKeyResolver}"
      routes:
        - id: frontend-user
          uri: lb://user-management
          predicates:
            - Path=/api/v1/frontend/user/**
        - id: frontend-auth
          uri: lb://auth-management
          predicates:
            - Path=/api/v1/frontend/auth/**
        - id: frontend-organization
          uri: lb://organization-management
          predicates:
            - Path=/api/v1/frontend/organization/**
        - id: frontend-inventory
          uri: lb://inventory-management
          predicates:
            - Path=/api/v1/frontend/inventory/**
        - id: frontend-shipment
          uri: lb://shipment-management
          predicates:
            - Path=/api/v1/frontend/shipment/**
        - id: frontend-document
          uri: lb://documents-management
          predicates:
            - Path=/api/v1/frontend/document/**
        - id: frontend-fleet
          uri: lb://fleet-management
          predicates:
            - Path=/api/v1/frontend/fleet/**
        - id: frontend-trip
          uri: lb://trip-tracking
          predicates:
            - Path=/api/v1/frontend/trip/**
        - id: frontend-billing
          uri: lb://billing-payments
          predicates:
            - Path=/api/v1/frontend/billing/**
        - id: frontend-notification
          uri: lb://notifications
          predicates:
            - Path=/api/v1/frontend/notification/**
        - id: system-user
          uri: lb://user-management
          predicates:
            - Path=/api/v1/system/user/**
        - id: system-auth
          uri: lb://auth-management
          predicates:
            - Path=/api/v1/system/auth/**
        - id: system-organization
          uri: lb://organization-management
          predicates:
            - Path=/api/v1/system/organization/**
        - id: system-inventory
          uri: lb://inventory-management
          predicates:
            - Path=/api/v1/system/inventory/**
        - id: system-shipment
          uri: lb://shipment-management
          predicates:
            - Path=/api/v1/system/shipment/**
        - id: system-document
          uri: lb://documents-management
          predicates:
            - Path=/api/v1/system/document/**
        - id: system-fleet
          uri: lb://fleet-management
          predicates:
            - Path=/api/v1/system/fleet/**
        - id: system-trip
          uri: lb://trip-tracking
          predicates:
            - Path=/api/v1/system/trip/**
        - id: system-billing
          uri: lb://billing-payments
          predicates:
            - Path=/api/v1/system/billing/**
        - id: system-notification
          uri: lb://notifications
          predicates:
            - Path=/api/v1/system/notification/**

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

gateway:
  jwt:
    secret: ${JWT_SECRET}
    roles-claim: roles

management:
  server:
    port: 9080
  endpoints:
    web:
      exposure:
        include: health,info
  tracing:
    sampling:
      probability: 0.05

logging:
  level:
    root: WARN
    org.springframework.cloud.gateway: INFO
    projectlx.co.zw.apigateway: INFO
