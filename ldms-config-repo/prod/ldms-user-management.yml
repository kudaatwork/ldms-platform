server:
  port: 8081

spring:
  application:
    name: ldms-user-management
  datasource:
    url: jdbc:mysql://${DB_HOST}:3306/ldms_user_management?useSSL=true&requireSSL=true&serverTimezone=UTC
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 50
      minimum-idle: 10
      idle-timeout: 600000
      connection-timeout: 30000
  jpa:
    show-sql: false
  cache:
    type: redis
    redis:
      time-to-live: 1800000
ldms:
  audit:
    enabled: true
  user:
    password:
      expiry-days: 90
      history-count: 5
      min-length: 8
      require-uppercase: true
      require-digit: true
      require-special: true
    account:
      max-failed-attempts: 5
      lock-duration-minutes: 30

clients:
  base-url:
    location-management: http://ldms-location-management
    documents-management: http://ldms-documents-management
    organization-management: http://ldms-organization-management

management:
  server:
    port: 9081
  tracing:
    sampling:
      probability: 0.05

logging:
  level:
    root: WARN
    projectlx: INFO

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL}