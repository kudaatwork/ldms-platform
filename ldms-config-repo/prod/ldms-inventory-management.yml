server:
  port: 8086

spring:
  application:
    name: ldms-inventory-management
  datasource:
    url: jdbc:mysql://${DB_HOST}:3306/ldms_inventory_management?useSSL=true&requireSSL=true&serverTimezone=UTC
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 50
      minimum-idle: 10
      idle-timeout: 600000
      connection-timeout: 30000
  jpa:
    show-sql: false
  main:
    allow-bean-definition-overriding: true
clients:
  base-url:
    user-management: http://ldms-user-management
    location-management: http://ldms-location-management
    organization-management: http://ldms-organization-management
    reference-config: http://ldms-reference-config

ldms:
  inventory:
    stock-lock-ttl-seconds: 30
    reservation-expiry-hours: 24

management:
  server:
    port: 9086
  tracing:
    sampling:
      probability: 0.05

logging:
  level:
    root: WARN
    projectlx: INFO

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL}