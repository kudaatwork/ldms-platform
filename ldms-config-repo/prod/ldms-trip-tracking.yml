server:
  port: 8090

spring:
  application:
    name: ldms-trip-tracking
  datasource:
    url: jdbc:mysql://${DB_HOST}:3306/ldms_trip_tracking?useSSL=true&requireSSL=true&serverTimezone=UTC
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 50
      minimum-idle: 10
      idle-timeout: 600000
      connection-timeout: 30000
  jpa:
    show-sql: false
mqtt:
  broker-url: tcp://${MQTT_HOST}:1883
  client-id: ldms-trip-tracking-${random.int}
  username: ${MQTT_USERNAME}
  password: ${MQTT_PASSWORD}
  topic:
    gps-inbound: ldms/devices/+/gps
    gps-outbound-prefix: ldms/trips/
  qos: 1

clients:
  base-url:
    fleet-management: http://ldms-fleet-management
    shipment-management: http://ldms-shipment-management

ldms:
  trip:
    websocket:
      endpoint: /ws
      destination-prefix: /topic/trips
    gps:
      inactive-device-ttl-seconds: 86400

management:
  server:
    port: 9090
  tracing:
    sampling:
      probability: 0.05

logging:
  level:
    root: WARN
    projectlx: INFO

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL}