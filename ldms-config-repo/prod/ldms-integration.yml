server:
  port: 8097

spring:
  application:
    name: ldms-integration
  jpa:
    hibernate:
      ddl-auto: none
  flyway:
    enabled: false

twilio:
  account-sid: ${TWILIO_ACCOUNT_SID}
  auth-token: ${TWILIO_AUTH_TOKEN}
  sms-from: ${TWILIO_PHONE_NUMBER}
  whatsapp-from: ${TWILIO_WHATSAPP_FROM}

sendgrid:
  api-key: ${SENDGRID_API_KEY}
  from-email: ${SENDGRID_FROM_EMAIL}

firebase:
  server-key: ${FIREBASE_SERVER_KEY}
  service-account-file: classpath:firebase-adminsdk.json
aws:
  region: ${AWS_REGION}
  ses:
    from-email: ${AWS_SES_FROM_EMAIL}
  credentials:
    access-key: ${AWS_ACCESS_KEY_ID}
    secret-key: ${AWS_SECRET_ACCESS_KEY}

mqtt:
  broker-url: tcp://${MQTT_HOST}:1883
  client-id: ldms-integration-${random.int}
  username: ${MQTT_USERNAME}
  password: ${MQTT_PASSWORD}

management:
  server:
    port: 9097
  tracing:
    sampling:
      probability: 0.05

logging:
  level:
    root: WARN
    projectlx: INFO

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL}