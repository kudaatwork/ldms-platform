server:
  port: 8082

spring:
  application:
    name: ldms-auth-management
  datasource:
    url: jdbc:mysql://${DB_HOST}:3306/ldms_auth_management?useSSL=true&requireSSL=true&serverTimezone=UTC
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 50
      minimum-idle: 10
      idle-timeout: 600000
      connection-timeout: 30000
  jpa:
    show-sql: false
clients:
  base-url:
    user-management: http://ldms-user-management

ldms:
  auth:
    otp-expiry-minutes: 5
    max-otp-attempts: 3

management:
  server:
    port: 9082
  tracing:
    sampling:
      probability: 0.05

logging:
  level:
    root: WARN
    projectlx: INFO

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL}