server:
  port: 8100

spring:
  application:
    name: ldms-scheduler
  jpa:
    hibernate:
      ddl-auto: none
  flyway:
    enabled: false

ldms:
  scheduler:
    overdue-invoices-cron: "0 0 1 * * *"
    compliance-check-cron: "0 0 6 * * *"
    kyc-sla-cron: "0 */30 * * * *"
    monthly-report-cron: "0 0 2 1 * *"

clients:
  base-url:
    billing-payments: http://ldms-billing-payments
    fleet-management: http://ldms-fleet-management
    organization-management: http://ldms-organization-management

management:
  server:
    port: 9100
  tracing:
    sampling:
      probability: 0.05

logging:
  level:
    root: WARN
    projectlx: INFO

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL}