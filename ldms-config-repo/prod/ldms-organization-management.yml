server:
  port: 8083

spring:
  application:
    name: ldms-organization-management
  datasource:
    url: jdbc:mysql://${DB_HOST}:3306/ldms_organization_management?useSSL=true&requireSSL=true&serverTimezone=UTC
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 50
      minimum-idle: 10
      idle-timeout: 600000
      connection-timeout: 30000
  jpa:
    show-sql: false
app:
  verification:
    base-url: ${APP_VERIFICATION_BASE_URL}
  kyc:
    stage1-sla-hours: 48
    stage2-sla-hours: 24

clients:
  base-url:
    user-management: http://ldms-user-management
    location-management: http://ldms-location-management
    documents-management: http://ldms-documents-management

management:
  server:
    port: 9083
  tracing:
    sampling:
      probability: 0.05

logging:
  level:
    root: WARN
    projectlx: INFO

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL}