server:
  port: 8081

spring:
  application:
    name: user-management
  datasource:
    url: jdbc:mysql://${DB_HOST:staging-db}:3306/ldms_user_management?useSSL=true&serverTimezone=UTC
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 30000
      connection-timeout: 20000
  jpa:
    show-sql: false
  cache:
    type: redis
    redis:
      time-to-live: 1800000
ldms:
  audit:
    enabled: true
  user:
    password:
      expiry-days: 90
      history-count: 5
      min-length: 8
      require-uppercase: true
      require-digit: true
      require-special: true
    account:
      max-failed-attempts: 5
      lock-duration-minutes: 30

clients:
  base-url:
    locationService: http://ldms-location-management:${LOCATION_MANAGEMENT_SERVER_PORT:8084}
    fileUploadService: http://ldms-documents-management:${DOCUMENTS_MANAGEMENT_SERVER_PORT:8080}

management:
  server:
    port: 9081
  tracing:
    sampling:
      probability: 0.1

logging:
  level:
    projectlx: INFO

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://staging-eureka:8761/eureka/}