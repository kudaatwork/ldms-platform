server:
  port: 8082

spring:
  application:
    name: auth-management
  datasource:
    url: jdbc:mysql://${DB_HOST:staging-db}:3306/ldms_auth_management?useSSL=true&serverTimezone=UTC
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 3
  jpa:
    show-sql: false
clients:
  base-url:
    userManagementService: http://user-management:${USER_MANAGEMENT_SERVER_PORT:8081}

ldms:
  auth:
    otp-expiry-minutes: 5
    max-otp-attempts: 3

management:
  server:
    port: 9082
  tracing:
    sampling:
      probability: 0.1

logging:
  level:
    projectlx: INFO

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://staging-eureka:8761/eureka/}