server:
  port: 8088

spring:
  application:
    name: ldms-documents-management
  datasource:
    url: jdbc:mysql://${DB_HOST:staging-db}:3306/ldms_documents_management?useSSL=true&serverTimezone=UTC
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    show-sql: false
ldms:
  file-service:
    base-url: ${FILE_SERVICE_BASE_URL}
    internal-token: ${FILE_SERVICE_TOKEN}
    max-file-size-mb: 50

management:
  server:
    port: 9088
  tracing:
    sampling:
      probability: 0.1

logging:
  level:
    projectlx: INFO

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://staging-eureka:8761/eureka/}