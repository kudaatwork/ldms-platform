server:
  port: 8099

spring:
  application:
    name: ldms-audit-trail
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:ldms_audit_trail_dev_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME:${MYSQL_USER:developer}}
    password: ${DB_PASSWORD:${MYSQL_DEVELOPER_PASSWORD:}}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
          batch_size: 50
        order_inserts: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:admin}
    password: ${RABBITMQ_PASSWORD:admin}
    listener:
      simple:
        concurrency: 3
        max-concurrency: 10
        prefetch: 20
        acknowledge-mode: manual
        default-requeue-rejected: false

management:
  endpoints:
    web:
      exposure:
        include: health,info

ldms:
  audit:
    enabled: false
