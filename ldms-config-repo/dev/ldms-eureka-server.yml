server:
  port: 8761

spring:
  application:
    name: ldms-eureka-server
  security:
    user:
      name: ${EUREKA_DASHBOARD_USER:eureka}
      password: ${EUREKA_DASHBOARD_PASSWORD:changeme}

eureka:
  instance:
    hostname: ${EUREKA_HOSTNAME:localhost}
    prefer-ip-address: false
    lease-renewal-interval-in-seconds: 30
    lease-expiration-duration-in-seconds: 90
  client:
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: http://${spring.security.user.name}:${spring.security.user.password}@${eureka.instance.hostname}:${server.port}/eureka/
    filter-only-up-instances: true
    registry-fetch-interval-seconds: 30
  server:
    enable-self-preservation: true
    renewal-percent-threshold: 0.85
    renewal-threshold-update-interval-ms: 900000
    eviction-interval-timer-in-ms: 60000
    response-cache-auto-expire-in-seconds: 180
    response-cache-update-interval-ms: 30000
    wait-time-in-ms-when-sync-empty: 0
    peer-eureka-nodes-update-interval-ms: 600000
    peer-node-connect-timeout-ms: 200
    peer-node-read-timeout-ms: 200
    peer-node-total-connections: 1000
    peer-node-total-connections-per-host: 500
    peer-node-connection-idle-timeout-seconds: 30
    initial-registry-info-replication-delay-ms: 40000
    peer-eureka-status-refresh-time-interval-ms: 30000

logging:
  level:
    com.netflix.eureka: INFO
    com.netflix.discovery: INFO
