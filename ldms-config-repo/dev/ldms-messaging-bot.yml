server:
  port: 8095

spring:
  application:
    name: ldms-messaging-bot
  datasource:
    url: jdbc:mysql://localhost:3306/ldms_messaging_bot?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    show-sql: true

management:
  server:
    port: 9095

twilio:
  account-sid: ${TWILIO_ACCOUNT_SID}
  auth-token: ${TWILIO_AUTH_TOKEN}
  phone-number: ${TWILIO_PHONE_NUMBER}
  whatsapp:
    from-number: ${TWILIO_WHATSAPP_FROM}
    sandbox-mode: true
