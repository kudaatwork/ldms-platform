server:
  port: 8086

spring:
  application:
    name: ldms-inventory-management
  datasource:
    url: jdbc:mysql://localhost:3306/ldms_inventory_management?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 30
      minimum-idle: 5
  jpa:
    show-sql: true
  main:
    allow-bean-definition-overriding: true

management:
  server:
    port: 9086

clients:
  base-url:
    user-management: http://ldms-user-management
    location-management: http://ldms-location-management
    organization-management: http://ldms-organization-management
    reference-config: http://ldms-reference-config

ldms:
  inventory:
    stock-lock-ttl-seconds: 30
    reservation-expiry-hours: 24
