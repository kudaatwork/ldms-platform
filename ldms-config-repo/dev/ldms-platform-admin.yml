server:
  port: 8096

spring:
  application:
    name: ldms-platform-admin
  datasource:
    url: jdbc:mysql://localhost:3306/ldms_platform_admin?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    show-sql: true

management:
  server:
    port: 9096

clients:
  base-url:
    organization-management: http://ldms-organization-management
    user-management: http://ldms-user-management
