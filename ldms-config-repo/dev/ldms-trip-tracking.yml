server:
  port: 8090

spring:
  application:
    name: ldms-trip-tracking
  datasource:
    url: jdbc:mysql://localhost:3306/ldms_trip_tracking?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 30   # higher — GPS inserts are bursty
      minimum-idle: 5
  jpa:
    show-sql: false   # too noisy with GPS points

management:
  server:
    port: 9090

mqtt:
  broker-url: tcp://localhost:1883
  client-id: ldms-trip-tracking-${random.int}
  username: ${MQTT_USERNAME:admin}
  password: ${MQTT_PASSWORD:admin}
  topic:
    gps-inbound: ldms/devices/+/gps
    gps-outbound-prefix: ldms/trips/
  qos: 1

clients:
  base-url:
    fleet-management: http://ldms-fleet-management
    shipment-management: http://ldms-shipment-management

ldms:
  trip:
    websocket:
      endpoint: /ws
      destination-prefix: /topic/trips
    gps:
      inactive-device-ttl-seconds: 86400
