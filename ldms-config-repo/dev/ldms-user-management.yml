server:
  port: 8081

spring:
  application:
    name: ldms-user-management
  datasource:
    url: jdbc:mysql://localhost:3306/ldms_user_management?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 30000
      connection-timeout: 20000
  jpa:
    show-sql: true    # dev only
  cache:
    type: redis
    redis:
      time-to-live: 1800000

management:
  server:
    port: 9081

ldms:
  audit:
    enabled: true
  user:
    password:
      expiry-days: 90
      history-count: 5
      min-length: 8
      require-uppercase: true
      require-digit: true
      require-special: true
    account:
      max-failed-attempts: 5
      lock-duration-minutes: 30

clients:
  base-url:
    location-management: http://ldms-location-management
    documents-management: http://ldms-documents-management
    organization-management: http://ldms-organization-management
