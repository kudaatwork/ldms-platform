<div class="lx-dialog-shell" [class.is-edit]="isEdit" [class.is-view]="isView">
  <div class="lx-dialog-header">
    <div class="lx-header-text">
      <h2 class="lx-dialog-title">{{ title }}</h2>
      <p class="lx-dialog-subtitle">{{ subtitle }}</p>
    </div>
    <button mat-icon-button class="lx-close-button" type="button" aria-label="Close dialog" (click)="cancel()">
      <mat-icon>close</mat-icon>
    </button>
  </div>

  <form [formGroup]="form" class="lx-step-content" (ngSubmit)="save()">
    <div class="lx-form-grid">
      <div class="lx-field">
        <label class="lx-field-label">Kind <span class="req" *ngIf="!isView">*</span></label>
        <div class="lx-input-shell">
          <mat-icon class="lx-input-shell__icon">badge</mat-icon>
          <select formControlName="agentKind" aria-label="Agent kind">
            <option value="INDIVIDUAL">Individual</option>
            <option value="ORGANIZATION">Organisation representative</option>
          </select>
        </div>
      </div>

      <div class="lx-field">
        <label class="lx-field-label">First name <span class="req" *ngIf="!isView">*</span></label>
        <div class="lx-input-shell" [class.lx-input-shell--invalid]="hasError('firstName', 'required')">
          <mat-icon class="lx-input-shell__icon">person</mat-icon>
          <input formControlName="firstName" maxlength="100" />
        </div>
      </div>

      <div class="lx-field">
        <label class="lx-field-label">Last name <span class="req" *ngIf="!isView">*</span></label>
        <div class="lx-input-shell" [class.lx-input-shell--invalid]="hasError('lastName', 'required')">
          <mat-icon class="lx-input-shell__icon">person</mat-icon>
          <input formControlName="lastName" maxlength="100" />
        </div>
      </div>

      <div class="lx-field">
        <label class="lx-field-label">Email</label>
        <div class="lx-input-shell">
          <mat-icon class="lx-input-shell__icon">email</mat-icon>
          <input formControlName="email" type="email" maxlength="255" />
        </div>
      </div>

      <div class="lx-field">
        <label class="lx-field-label">Phone</label>
        <div class="lx-input-shell">
          <mat-icon class="lx-input-shell__icon">phone</mat-icon>
          <input formControlName="phoneNumber" maxlength="50" />
        </div>
      </div>

      <div class="lx-field">
        <label class="lx-field-label">Role</label>
        <div class="lx-input-shell">
          <mat-icon class="lx-input-shell__icon">work</mat-icon>
          <input formControlName="role" maxlength="100" />
        </div>
      </div>

      <div class="lx-field">
        <label class="lx-field-label">Region</label>
        <div class="lx-input-shell">
          <mat-icon class="lx-input-shell__icon">map</mat-icon>
          <input formControlName="assignedRegion" maxlength="200" />
        </div>
      </div>

      <div class="lx-field lx-field--toggle">
        <label class="lx-field-label">Status</label>
        <mat-slide-toggle formControlName="active" color="primary">Active</mat-slide-toggle>
      </div>
    </div>

    <p class="lx-form-error" *ngIf="saveError">
      <mat-icon>error_outline</mat-icon>
      <span>{{ saveError }}</span>
    </p>

    <div class="lx-step-actions">
      <button mat-stroked-button type="button" (click)="cancel()" [disabled]="submitting">
        {{ isView ? 'Close' : 'Cancel' }}
      </button>
      <button *ngIf="!isView" mat-raised-button color="primary" type="submit" [disabled]="form.invalid || submitting">
        {{ submitting ? (isEdit ? 'Updating…' : 'Saving…') : (isEdit ? 'Update' : 'Save') }}
      </button>
    </div>
  </form>
</div>
