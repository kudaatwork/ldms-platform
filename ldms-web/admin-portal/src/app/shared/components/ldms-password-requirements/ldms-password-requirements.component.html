<ul class="ldms-pwd-req" aria-label="Password requirements">
  <li
    *ngFor="let rule of rules"
    class="ldms-pwd-req__item"
    [class.ldms-pwd-req__item--met]="ruleMet(rule)"
    [class.ldms-pwd-req__item--pending]="password.length > 0 && !ruleMet(rule)"
  >
    <mat-icon class="ldms-pwd-req__icon" aria-hidden="true">
      {{ ruleMet(rule) ? 'check_circle' : password.length > 0 ? 'cancel' : 'radio_button_unchecked' }}
    </mat-icon>
    <span>{{ rule.label }}</span>
  </li>
</ul>
