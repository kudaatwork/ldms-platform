<h2 mat-dialog-title class="ke-title">Edit KYC application</h2>

<mat-dialog-content class="ke-content">
  <p class="ke-lead">Update the application record. Changes apply to this queue only until the API is wired.</p>

  <form [formGroup]="form" class="ke-form">
    <div class="ke-field">
      <span class="lx-dialog-field-label">Applicant name</span>
      <div
        class="lx-input-shell"
        [class.lx-input-shell--invalid]="form.get('applicant')?.invalid && form.get('applicant')?.touched"
      >
        <mat-icon class="lx-input-shell__icon">person_outline</mat-icon>
        <input formControlName="applicant" autocomplete="organization" />
      </div>
      <p class="lx-shell-error" *ngIf="form.get('applicant')?.hasError('required') && form.get('applicant')?.touched">
        Required
      </p>
    </div>

    <div class="ke-field">
      <span class="lx-dialog-field-label">Status</span>
      <div
        class="lx-input-shell"
        [class.lx-input-shell--invalid]="form.get('status')?.invalid && form.get('status')?.touched"
      >
        <mat-icon class="lx-input-shell__icon">flag_outlined</mat-icon>
        <select formControlName="status" aria-label="Status">
          <option *ngFor="let opt of statusOptions" [value]="opt.value">{{ opt.label }}</option>
        </select>
      </div>
    </div>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end" class="ke-actions">
  <button type="button" mat-button (click)="cancel()">Cancel</button>
  <button type="button" mat-flat-button color="primary" (click)="save()">Save</button>
</mat-dialog-actions>
