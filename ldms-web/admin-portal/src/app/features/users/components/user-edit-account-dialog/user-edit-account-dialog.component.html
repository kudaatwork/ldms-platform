<div class="lx-dialog-shell lx-dialog-shell--compact">
  <div class="lx-dialog-header">
    <div class="lx-header-text">
      <h2 class="lx-dialog-title">Edit account</h2>
      <p class="lx-dialog-subtitle">Account flags and contact fields for this user.</p>
    </div>
    <button mat-icon-button type="button" class="lx-close-button" aria-label="Close dialog" (click)="close()">
      <mat-icon>close</mat-icon>
    </button>
  </div>

  <div class="lx-step-content">
    <div class="lx-form-grid">
      <div class="lx-field">
        <label class="lx-field-label">Account phone</label>
        <div class="lx-input-shell">
          <mat-icon class="lx-input-shell__icon">phone</mat-icon>
          <input [(ngModel)]="phoneNumber" placeholder="e.g. +263771234567" />
        </div>
      </div>
      <div class="lx-field">
        <label class="lx-field-label">Account number</label>
        <div class="lx-input-shell">
          <mat-icon class="lx-input-shell__icon">confirmation_number</mat-icon>
          <input [(ngModel)]="accountNumber" placeholder="Account or reference number" />
        </div>
      </div>
      <div class="lx-field span-2 ued-toggle-row">
        <span class="lx-field-label">Account locked</span>
        <mat-slide-toggle [(ngModel)]="isAccountLocked">Locked</mat-slide-toggle>
      </div>
    </div>

    <p class="lx-form-error" *ngIf="error">
      <mat-icon>error_outline</mat-icon>
      <span>{{ error }}</span>
    </p>

    <div class="lx-step-actions">
      <button mat-stroked-button type="button" (click)="close()" [disabled]="saving">Cancel</button>
      <button mat-raised-button color="primary" type="button" (click)="save()" [disabled]="saving">
        {{ saving ? 'Saving…' : 'Save' }}
      </button>
    </div>
  </div>
</div>
