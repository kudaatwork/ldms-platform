<h2 mat-dialog-title>Edit user details</h2>

<mat-dialog-content class="ued-body">
  <p class="ued-lead">Changes are saved to user management. Leave file fields empty to keep existing uploads.</p>

  <div class="ued-grid">
    <label class="ued-field">
      <span class="ued-label">Username <span class="ued-req">*</span></span>
      <div class="lx-input-shell">
        <mat-icon class="lx-input-shell__icon">alternate_email</mat-icon>
        <input [(ngModel)]="username" placeholder="e.g. tinashe.moyo" autocomplete="off" />
      </div>
    </label>
    <label class="ued-field">
      <span class="ued-label">Email <span class="ued-req">*</span></span>
      <div class="lx-input-shell">
        <mat-icon class="lx-input-shell__icon">mail_outline</mat-icon>
        <input type="email" [(ngModel)]="email" placeholder="e.g. tinashe@example.com" autocomplete="off" />
      </div>
    </label>
    <label class="ued-field">
      <span class="ued-label">First name <span class="ued-req">*</span></span>
      <div class="lx-input-shell">
        <mat-icon class="lx-input-shell__icon">person</mat-icon>
        <input [(ngModel)]="firstName" placeholder="e.g. Tinashe" />
      </div>
    </label>
    <label class="ued-field">
      <span class="ued-label">Last name <span class="ued-req">*</span></span>
      <div class="lx-input-shell">
        <mat-icon class="lx-input-shell__icon">person_outline</mat-icon>
        <input [(ngModel)]="lastName" placeholder="e.g. Moyo" />
      </div>
    </label>
    <label class="ued-field">
      <span class="ued-label">Gender <span class="ued-req">*</span></span>
      <div class="lx-input-shell">
        <mat-icon class="lx-input-shell__icon">wc</mat-icon>
        <select [(ngModel)]="gender">
          <option value="" disabled>Select…</option>
          <option *ngFor="let g of genderOptions" [value]="g">{{ g }}</option>
        </select>
      </div>
    </label>
    <label class="ued-field">
      <span class="ued-label">Phone <span class="ued-req">*</span></span>
      <div class="lx-input-shell">
        <mat-icon class="lx-input-shell__icon">phone</mat-icon>
        <input [(ngModel)]="phoneNumber" placeholder="e.g. +263771234567" />
      </div>
    </label>
    <label class="ued-field">
      <span class="ued-label">Date of birth <span class="ued-req">*</span></span>
      <div class="lx-input-shell">
        <mat-icon class="lx-input-shell__icon">event</mat-icon>
        <input type="date" [(ngModel)]="dateOfBirth" />
      </div>
    </label>
    <label class="ued-field">
      <span class="ued-label">National ID</span>
      <div class="lx-input-shell">
        <mat-icon class="lx-input-shell__icon">badge</mat-icon>
        <input [(ngModel)]="nationalIdNumber" placeholder="National ID number" />
      </div>
    </label>
    <label class="ued-field">
      <span class="ued-label">National ID expiry</span>
      <div class="lx-input-shell">
        <mat-icon class="lx-input-shell__icon">event_available</mat-icon>
        <input type="date" [(ngModel)]="nationalIdExpiryDate" />
      </div>
    </label>
    <label class="ued-field ued-field--full">
      <span class="ued-label">Replace national ID scan</span>
      <div class="lx-input-shell">
        <mat-icon class="lx-input-shell__icon">upload_file</mat-icon>
        <input type="file" accept=".pdf,.jpg,.jpeg,.png" (change)="onNationalFile($event)" />
      </div>
    </label>
    <label class="ued-field">
      <span class="ued-label">Passport number</span>
      <div class="lx-input-shell">
        <mat-icon class="lx-input-shell__icon">assignment_ind</mat-icon>
        <input [(ngModel)]="passportNumber" placeholder="Passport number" />
      </div>
    </label>
    <label class="ued-field">
      <span class="ued-label">Passport expiry</span>
      <div class="lx-input-shell">
        <mat-icon class="lx-input-shell__icon">event_busy</mat-icon>
        <input type="date" [(ngModel)]="passportExpiryDate" />
      </div>
    </label>
    <label class="ued-field ued-field--full">
      <span class="ued-label">Replace passport scan</span>
      <div class="lx-input-shell">
        <mat-icon class="lx-input-shell__icon">upload</mat-icon>
        <input type="file" accept=".pdf,.jpg,.jpeg,.png" (change)="onPassportFile($event)" />
      </div>
    </label>

    <ng-container *ngIf="hasPreferences">
      <p class="ued-lead ued-lead--divider">Preferences</p>
      <label class="ued-field">
        <span class="ued-label">Preferred language <span class="ued-req">*</span></span>
        <div class="lx-input-shell">
          <mat-icon class="lx-input-shell__icon">translate</mat-icon>
          <input [(ngModel)]="preferredLanguage" placeholder="e.g. en" />
        </div>
      </label>
      <label class="ued-field">
        <span class="ued-label">Timezone (IANA) <span class="ued-req">*</span></span>
        <div class="lx-input-shell">
          <mat-icon class="lx-input-shell__icon">schedule</mat-icon>
          <input [(ngModel)]="timezone" placeholder="e.g. Africa/Harare" />
        </div>
      </label>
    </ng-container>
  </div>

  <p class="ued-error" *ngIf="error">{{ error }}</p>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button type="button" mat-stroked-button (click)="close()" [disabled]="saving">Cancel</button>
  <button type="button" mat-flat-button color="primary" (click)="save()" [disabled]="saving">
    {{ saving ? 'Saving…' : 'Save changes' }}
  </button>
</mat-dialog-actions>
