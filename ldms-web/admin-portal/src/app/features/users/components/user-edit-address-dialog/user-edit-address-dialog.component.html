<div class="lx-dialog-shell lx-dialog-shell--wide">
  <div class="lx-dialog-header">
    <div class="lx-header-text">
      <h2 class="lx-dialog-title">Edit address</h2>
      <p class="lx-dialog-subtitle">
        Update the physical address for this user. Select country through suburb (same as Edit user details).
      </p>
    </div>
    <button mat-icon-button type="button" class="lx-close-button" aria-label="Close dialog" (click)="close()">
      <mat-icon>close</mat-icon>
    </button>
  </div>

  <div class="lx-step-content">
    <div class="lx-form-grid">
      <div class="lx-form-section span-2">
        <div class="lx-form-section-title">Address</div>
        <p class="lx-form-section-lead">
          Address line 1, postal code, and suburb are required. Location service links are applied automatically on save.
        </p>
      </div>

      <div class="lx-field span-2">
        <label class="lx-field-label">Address line 1 <span class="req">*</span></label>
        <div class="lx-input-shell">
          <mat-icon class="lx-input-shell__icon">home</mat-icon>
          <input [(ngModel)]="line1" placeholder="Street address" />
        </div>
      </div>

      <div class="lx-field span-2">
        <label class="lx-field-label">Address line 2</label>
        <div class="lx-input-shell">
          <mat-icon class="lx-input-shell__icon">home_work</mat-icon>
          <input [(ngModel)]="line2" placeholder="Optional" />
        </div>
      </div>

      <div class="lx-field span-2">
        <label class="lx-field-label">Postal code <span class="req">*</span></label>
        <div class="lx-input-shell">
          <mat-icon class="lx-input-shell__icon">markunread_mailbox</mat-icon>
          <input [(ngModel)]="postalCode" placeholder="e.g. 00263" />
        </div>
      </div>

      <app-user-address-cascade-fields
        class="span-2"
        [(suburbId)]="suburbIdStr"
        [seedSuburbId]="seedSuburbId"
        [disabled]="saving"
      ></app-user-address-cascade-fields>
    </div>

    <p class="lx-form-error" *ngIf="error">
      <mat-icon>error_outline</mat-icon>
      <span>{{ error }}</span>
    </p>

    <div class="lx-step-actions">
      <button mat-stroked-button type="button" (click)="close()" [disabled]="saving">Cancel</button>
      <button mat-raised-button color="primary" type="button" (click)="save()" [disabled]="saving">
        {{ saving ? 'Saving…' : 'Save changes' }}
      </button>
    </div>
  </div>
</div>
